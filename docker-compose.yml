services:
  # -------------------------------------------------------
  # LingoAcademic Unified AI (Monolith)
  # -------------------------------------------------------
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./.tmp:/app/.tmp
    restart: unless-stopped
